<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piscina Escolar – Tu espacio de bienestar acuático</title>
    <meta name="description" content="Piscina del colegio: horarios, precios, actividades acuáticas y contacto. Instalaciones modernas para estudiantes de todas las edades.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #faf5ff;
            color: #333;
        }
        
        #app {
            width: 100%;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <!-- 
        CONTENEDOR PRINCIPAL DE LA APLICACIÓN
        La aplicación se renderizará completamente aquí.
        Este es el ÚNICO lugar donde se modifica el DOM (mediante app.js)
    -->
    <div id="app"></div>

    <!-- SheetJS para exportación a Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- 
        CARGA DE SCRIPTS
        Cargamos app.js como un módulo de JavaScript para permitir import/export.
    -->
    <script type="module" src="./app.js"></script>
</body>
</html>
